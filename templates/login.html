<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="../static/login.css" />
  </head>
  <body style="background: rgb(2,0,36);
  background: linear-gradient(90deg, rgba(2,0,36,1) 0%, rgba(9,9,121,1) 5%, rgba(0,212,255,1) 54%);">
    <form action ="{{url_for("login")}}" method = "post">
    <div class="login">
      <div class="login-card">
        <div class="login-rows">
          <h1>Accounts</h1>
        </div>
        <div class="login-rows">
          <input type="text" 
          name = "username"
          placeholder="Enter Username" 
          class="login-input" />
        </div>
        <div class="login-rows">
          <input
            type="password"
            name = "password"
            placeholder="Enter Password"
            class="login-input"
          />
        </div>

        <div class="login-rows">
          <input
            type="submit"
            placeholder="login"
            value="Login"
            class="login-btn"
          />
        </div>

        <div class="login-rows">
          No Account!!
          <a href="./signup" class="login-rows-signup-link">Signup</a>
        </div>
      </div>
    </div>
  </form>
  </body>
</html>
